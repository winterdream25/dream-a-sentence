<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>今日关心 · AI生成</title>
    <style>
        /* 简单的美化样式 */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: linear-gradient(135deg, #a8ede0 0%, #fed6e3 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .container {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(10px);
            border-radius: 48px;
            padding: 40px 30px;
            max-width: 600px;
            width: 100%;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
            border: 1px solid rgba(255, 255, 255, 0.3);
            text-align: center;
        }
        h1 {
            font-size: 24px;
            font-weight: 400;
            color: #4a5568;
            margin-bottom: 30px;
            letter-spacing: 1px;
        }
        .message-box {
            background: white;
            border-radius: 32px;
            padding: 40px 30px;
            margin: 20px 0 30px;
            min-height: 200px;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 1px solid rgba(255,255,255,0.5);
        }
        #message {
            font-size: 28px;
            line-height: 1.6;
            color: #2d3748;
            font-weight: 400;
            transition: opacity 0.3s ease;
            word-break: break-word;
        }
        .loading {
            display: none;
            flex-direction: column;
            align-items: center;
            gap: 20px;
        }
        .loading.active {
            display: flex;
        }
        .spinner {
            width: 50px;
            height: 50px;
            border: 3px solid #e2e8f0;
            border-top-color: #667eea;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        .button {
            background: white;
            border: none;
            padding: 16px 32px;
            border-radius: 50px;
            font-size: 18px;
            color: #4a5568;
            cursor: pointer;
            transition: all 0.2s;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            border: 1px solid rgba(0,0,0,0.05);
            margin-top: 20px;
        }
        .button:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 15px rgba(0,0,0,0.1);
        }
        .button:disabled {
            opacity: 0.5;
            pointer-events: none;
        }
        .footer {
            margin-top: 30px;
            color: #718096;
            font-size: 14px;
        }
        .error {
            color: #e53e3e;
            margin-top: 10px;
            font-size: 14px;
            display: none;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>✨ 今日关心 · AI生成 ✨</h1>
        
        <div class="message-box">
            <div id="message">正在为你生成一句话...</div>
            <div class="loading" id="loading">
                <div class="spinner"></div>
                <div>AI正在思考中...</div>
            </div>
        </div>
        
        <button class="button" id="generateBtn">换一句</button>
        <div class="error" id="error"></div>
        <div class="footer">每次刷新都是独一无二的话</div>
    </div>

    <script>
        // 你的 DeepSeek API 密钥（请替换成你自己的）
        const API_KEY = 'sk-ffa98cd59f934b0d9dfb1fcf024b6ee1';  // ← 在这里粘贴你的密钥

        // 备用本地话语库（当 API 调用失败时使用）
        const fallbackMessages = [
            "今天记得好好吃饭",
            "累了就休息一下", 
            "你已经做得很好了",
            "记得多喝水",
            "慢慢来，不着急",
            "今天也会是美好的一天",
            "你值得被温柔对待",
            "别太勉强自己",
            "有人在默默关心你",
            "今天也要开心"
        ];

        // 调用 DeepSeek API 获取 AI 生成的话语
        async function fetchAIMessage() {
            const response = await fetch('https://api.deepseek.com/v1/chat/completions', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'Authorization': `Bearer ${API_KEY}`
                },
                body: JSON.stringify({
                    model: 'deepseek-chat',
                    messages: [
                        {
                            role: 'system',
                            content: '你是一个温柔的朋友。请生成一句关心用户的话，要温暖、自然，像朋友随口说的。不超过30个字，不要用引号，不要用“亲爱的”“宝贝”等称呼，就像日常聊天一样。每次都要不同。'
                        },
                        {
                            role: 'user',
                            content: '说一句关心我的话'
                        }
                    ],
                    temperature: 0.8,
                    max_tokens: 50
                })
            });

            if (!response.ok) {
                throw new Error(`API 请求失败: ${response.status}`);
            }

            const data = await response.json();
            return data.choices[0].message.content;
        }

        // 更新页面上的消息
        async function updateMessage(showLoading = true) {
            const messageEl = document.getElementById('message');
            const loadingEl = document.getElementById('loading');
            const errorEl = document.getElementById('error');
            const btn = document.getElementById('generateBtn');
            
            if (showLoading) {
                // 显示加载动画，隐藏原有消息
                messageEl.style.display = 'none';
                loadingEl.classList.add('active');
                btn.disabled = true;
                errorEl.style.display = 'none';
            }
            
            try {
                // 尝试从 AI 获取
                const aiMessage = await fetchAIMessage();
                
                if (showLoading) {
                    loadingEl.classList.remove('active');
                    messageEl.style.display = 'block';
                    btn.disabled = false;
                }
                
                messageEl.textContent = aiMessage;
            } catch (error) {
                console.error('API 错误:', error);
                
                if (showLoading) {
                    loadingEl.classList.remove('active');
                    messageEl.style.display = 'block';
                    btn.disabled = false;
                }
                
                // 使用备用本地话语
                const fallback = fallbackMessages[Math.floor(Math.random() * fallbackMessages.length)];
                messageEl.textContent = fallback;
                
                // 显示简短提示（可选）
                errorEl.textContent = 'AI 正在休息，先送你一句备用的话';
                errorEl.style.display = 'block';
                setTimeout(() => {
                    errorEl.style.display = 'none';
                }, 3000);
            }
        }

        // 页面加载时自动生成第一句
        window.addEventListener('load', () => {
            updateMessage(true);
        });

        // 点击按钮时生成新的一句
        document.getElementById('generateBtn').addEventListener('click', () => {
            updateMessage(true);
        });
    </script>
</body>
</html>
