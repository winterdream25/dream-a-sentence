<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>今日关心</title>
    <style>
        /* 完整的样式代码 */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: linear-gradient(135deg, #a8ede0 0%, #fed6e3 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .container {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(10px);
            border-radius: 48px;
            padding: 40px 30px;
            max-width: 600px;
            width: 100%;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
            border: 1px solid rgba(255, 255, 255, 0.3);
            text-align: center;
        }
        h1 {
            font-size: 24px;
            font-weight: 400;
            color: #4a5568;
            margin-bottom: 30px;
            letter-spacing: 1px;
        }
        .message-box {
            background: white;
            border-radius: 32px;
            padding: 40px 30px;
            margin: 20px 0 30px;
            min-height: 200px;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 1px solid rgba(255, 255, 255, 0.5);
        }
        #message {
            font-size: 28px;
            line-height: 1.6;
            color: #2d3748;
            font-weight: 400;
            transition: opacity 0.3s ease;
            word-break: break-word;
        }
        .button {
            background: white;
            border: none;
            padding: 16px 32px;
            border-radius: 50px;
            font-size: 18px;
            color: #4a5568;
            cursor: pointer;
            transition: all 0.2s;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.05);
            border: 1px solid rgba(0, 0, 0, 0.05);
            margin-top: 20px;
        }
        .button:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 15px rgba(0, 0, 0, 0.1);
        }
        .footer {
            margin-top: 30px;
            color: #718096;
            font-size: 14px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>✨ 今日关心 ✨</h1>
        
        <div class="message-box">
            <div id="message">今天记得好好吃饭</div>
        </div>
        
        <button class="button" onclick="getNewMessage()">换一句</button>
        <div class="footer">每次刷新都有新的温暖</div>
    </div>

    <script>
        // 本地词库 - 安全！无 API 密钥
        const messages = [
            "今天记得好好吃饭",
            "累了就休息一下",
            "你已经做得很好了",
            "今天也会是美好的一天",
            "记得多喝水",
            "你值得被温柔对待",
            "慢慢来，不着急",
            "今天有没有开心的事",
            "别太勉强自己",
            "有人在默默关心你",
            "今天也要开心",
            "你比想象中更坚强",
            "休息一下也没关系",
            "今天的你也很可爱",
            "记得早点睡",
            "天气变化，注意保暖",
            "你很重要",
            "今天也要照顾好自己",
            "允许自己不完美",
            "你被爱着",
            "今天也要爱自己",
            "你已经足够好了",
            "不开心的话就找我",
            "今天有没有好好吃饭",
            "记得给自己一个微笑"
        ];

        function getRandomMessage() {
            const randomIndex = Math.floor(Math.random() * messages.length);
            return messages[randomIndex];
        }

        function getNewMessage() {
            const messageEl = document.getElementById('message');
            messageEl.style.opacity = '0';
            setTimeout(() => {
                messageEl.textContent = getRandomMessage();
                messageEl.style.opacity = '1';
            }, 150);
        }

        // 页面加载时显示随机消息
        window.onload = function() {
            document.getElementById('message').textContent = getRandomMessage();
        };
    </script>
</body>
</html>
