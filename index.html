<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
    }
    
    body {
        font-family: "微软雅黑", "圆体", "Yuanti SC", sans-serif;
        background: linear-gradient(145deg, #ffd1dc 0%, #ffe4e1 100%);
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 20px;
        position: relative;
    }
    
    /* 添加小星星背景 */
    body::before {
        content: "✨✨✨";
        position: absolute;
        top: 10px;
        left: 10px;
        font-size: 24px;
        opacity: 0.3;
        animation: twinkle 3s infinite;
    }
    
    @keyframes twinkle {
        0% { opacity: 0.3; }
        50% { opacity: 0.6; }
        100% { opacity: 0.3; }
    }
    
    .container {
        background: rgba(255, 245, 245, 0.9);
        backdrop-filter: blur(12px);
        border-radius: 60px 60px 60px 60px;
        padding: 45px 35px;
        max-width: 600px;
        width: 100%;
        box-shadow: 0 30px 50px rgba(255, 150, 180, 0.2);
        border: 2px solid rgba(255, 255, 255, 0.7);
        text-align: center;
        position: relative;
        z-index: 1;
    }
    
    h1 {
        font-size: 26px;
        font-weight: 300;
        color: #b05b7a;
        margin-bottom: 30px;
        letter-spacing: 2px;
        text-shadow: 2px 2px 4px rgba(255, 200, 210, 0.5);
    }
    
    .message-box {
        background: white;
        border-radius: 50px;
        padding: 45px 35px;
        margin: 20px 0 30px;
        min-height: 200px;
        display: flex;
        align-items: center;
        justify-content: center;
        border: 2px solid #ffe2e2;
        box-shadow: inset 0 0 20px #fff0f0;
    }
    
    #message {
        font-size: 30px;
        line-height: 1.6;
        color: #8c4a5f;
        font-weight: 400;
        transition: opacity 0.3s ease;
        word-break: break-word;
    }
    
    .button {
        background: linear-gradient(145deg, #ffb6c1, #ff9eb5);
        border: none;
        padding: 18px 40px;
        border-radius: 40px;
        font-size: 20px;
        color: white;
        cursor: pointer;
        transition: all 0.3s;
        box-shadow: 0 8px 15px rgba(255, 120, 140, 0.3);
        border: 1px solid rgba(255, 255, 255, 0.5);
        margin-top: 20px;
        font-weight: 300;
        letter-spacing: 1px;
    }
    
    .button:hover {
        transform: translateY(-5px);
        box-shadow: 0 15px 25px rgba(255, 120, 140, 0.4);
        background: linear-gradient(145deg, #ff9eb5, #ff8da1);
    }
    
    .footer {
        margin-top: 30px;
        color: #b08e9b;
        font-size: 15px;
        font-style: italic;
    }
</style>
