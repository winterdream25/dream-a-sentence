<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>来自梦角的信 · 高级版</title>
    <style>
        /* 高级 · 静谧风格 */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #f5f2ec;  /* 暖白底 */
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            font-family: "Cormorant Garamond", "Times New Roman", "华文楷体", serif;
        }

        .container {
            max-width: 620px;
            width: 100%;
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border-radius: 28px;
            padding: 50px 42px;
            box-shadow: 0 30px 50px -20px rgba(0, 0, 0, 0.15),
                        0 0 0 1px rgba(255, 255, 255, 0.5) inset;
            border: 1px solid rgba(255, 255, 255, 0.7);
            transition: all 0.3s;
        }

        /* 输入界面 */
        .question-screen {
            text-align: center;
            padding: 30px 10px;
            transition: opacity 0.5s;
        }

        .question-title {
            font-size: 22px;
            letter-spacing: 1.5px;
            color: #5f5b55;
            font-weight: 300;
            margin-bottom: 35px;
            border-bottom: 1px solid #e0d8cf;
            display: inline-block;
            padding-bottom: 10px;
        }

        .input-group {
            margin: 35px 0;
        }

        #characterInput {
            font-family: inherit;
            font-size: 20px;
            padding: 14px 24px;
            width: 75%;
            max-width: 300px;
            background: rgba(255, 255, 255, 0.6);
            border: 1px solid #dad3c9;
            border-radius: 40px;
            text-align: center;
            color: #3f3b35;
            outline: none;
            transition: 0.2s;
            letter-spacing: 1px;
        }

        #characterInput:focus {
            border-color: #b7aa99;
            background: white;
        }

        .start-button {
            background: rgba(255, 255, 255, 0.7);
            border: 1px solid #cdc3b7;
            padding: 12px 40px;
            border-radius: 40px;
            font-size: 18px;
            color: #5f5549;
            cursor: pointer;
            transition: 0.2s;
            font-family: inherit;
            letter-spacing: 2px;
            backdrop-filter: blur(4px);
        }

        .start-button:hover {
            background: #e7dfd5;
            border-color: #b3a392;
        }

        /* 主内容区域 */
        .main-content {
            display: none;
        }

        .character-header {
            display: flex;
            align-items: baseline;
            gap: 15px;
            margin-bottom: 30px;
            border-bottom: 1px solid #e2d9cf;
            padding-bottom: 18px;
        }

        .character-name {
            font-size: 28px;
            color: #3f3a33;
            font-weight: 300;
            letter-spacing: 3px;
        }

        .character-sub {
            font-size: 16px;
            color: #b7aa9b;
            font-style: italic;
        }

        .date-section {
            display: flex;
            justify-content: space-between;
            margin-bottom: 20px;
            color: #9f9589;
            font-size: 16px;
            letter-spacing: 1px;
            border-bottom: 1px dashed #e0d7cd;
            padding-bottom: 12px;
        }

        .message-box {
            background: rgba(255, 255, 255, 0.5);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            border-radius: 24px;
            padding: 45px 30px;
            margin: 30px 0 20px;
            border: 1px solid rgba(255, 255, 255, 0.8);
            box-shadow: 0 12px 25px -10px rgba(0, 0, 0, 0.05);
            min-height: 200px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        #message {
            font-size: 22px;           /* 调小字体 */
            line-height: 1.5;           /* 行高适中 */
            color: #2f2c27;
            font-weight: 300;
            text-align: center;
            transition: opacity 0.3s;
            word-break: break-word;
            white-space: pre-line;
            max-width: 90%;
            display: -webkit-box;
            -webkit-line-clamp: 2;      /* 限制最多两行 */
            -webkit-box-orient: vertical;
            overflow: hidden;
            text-overflow: ellipsis;
            font-family: "Cormorant Garamond", "Times New Roman", "华文楷体", serif;
        }

        /* 次数提示 */
        .count-indicator {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin: 20px 0 15px;
            font-size: 15px;
            color: #b1a598;
        }

        .today-count {
            background: rgba(230, 220, 210, 0.3);
            padding: 6px 16px;
            border-radius: 40px;
            border: 1px solid #e2d9d0;
            font-style: italic;
        }

        .button {
            background: rgba(255, 255, 255, 0.6);
            border: 1px solid #d6cdc1;
            padding: 12px 38px;
            border-radius: 40px;
            font-size: 17px;
            color: #5f5549;
            cursor: pointer;
            transition: 0.2s;
            font-family: inherit;
            letter-spacing: 1.5px;
            backdrop-filter: blur(4px);
        }

        .button:hover:not(:disabled) {
            background: #e1d7cc;
            border-color: #b7aa99;
        }

        .button:disabled {
            opacity: 0.4;
            cursor: not-allowed;
            background: rgba(200, 190, 180, 0.2);
        }

        .reset-link {
            text-align: right;
            margin-top: 25px;
            font-size: 14px;
            color: #bcb1a4;
            cursor: pointer;
            text-decoration: underline;
            text-underline-offset: 4px;
            opacity: 0.6;
            transition: 0.2s;
        }

        .reset-link:hover {
            opacity: 1;
        }

        .footer {
            margin-top: 35px;
            color: #bfb5a9;
            font-size: 13px;
            text-align: center;
            letter-spacing: 1.5px;
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- 初始提问 -->
        <div class="question-screen" id="questionScreen">
            <div class="question-title">你将收到的信息来自</div>
            <div class="input-group">
                <input type="text" id="characterInput" placeholder="输入梦角的名字" autocomplete="off">
            </div>
            <button class="start-button" id="startBtn">开始</button>
        </div>

        <!-- 主内容 -->
        <div class="main-content" id="mainContent">
            <div class="character-header">
                <span class="character-name" id="characterName"></span>
                <span class="character-sub">的来信</span>
            </div>

            <div class="date-section">
                <span id="date"></span>
                <span id="weather"></span>
            </div>

            <div class="message-box">
                <div id="message">正在准备...</div>
            </div>

            <!-- 今日剩余次数显示 -->
            <div class="count-indicator">
                <span class="today-count" id="countDisplay">今日剩余 3 封</span>
                <button class="button" id="generateBtn">下一封</button>
            </div>

            <div class="reset-link" id="resetLink">换一位梦角</div>
            <div class="footer">每日三封信 · 明日 renewal</div>
        </div>
    </div>

    <script>
        (function() {
            // ------------------ 配置区 ------------------
            const MESSAGES = [
                "今天看到一朵云，长得很像你笑的样子。",
                "记得吃早饭，不要饿着。",
                "窗外的花开得很好，下次带你来看。",
                "昨晚梦到你了，醒来还在笑。",
                "累了的话，我在这里。",
                "今天的风很温柔，像你的名字。",
                "买了一本书，里面有句话想读给你听。",
                "突然想到你喜欢的那个口味，今天特意去买了。",
                "别太勉强自己，你已经很棒了。",
                "今天也要开心，算我拜托你的。",
                "下雨了，记得带伞，笨蛋。",
                "今天做了你爱吃的，虽然你不在。",
                "月亮很圆，分你一半。"
            ];

            const WEATHER_MOODS = ["☀️ 晴朗", "☁️ 多云", "🌤 温柔", "🍃 微风", "🌙 宁静", "✨ 清澈", "🌸 花开"];

            // ------------------ DOM 元素 ------------------
            const qScreen = document.getElementById('questionScreen');
            const mContent = document.getElementById('mainContent');
            const charInput = document.getElementById('characterInput');
            const startBtn = document.getElementById('startBtn');
            const charNameEl = document.getElementById('characterName');
            const resetLink = document.getElementById('resetLink');
            const dateEl = document.getElementById('date');
            const weatherEl = document.getElementById('weather');
            const messageEl = document.getElementById('message');
            const generateBtn = document.getElementById('generateBtn');
            const countDisplay = document.getElementById('countDisplay');

            // ------------------ 工具函数 ------------------
            function getTodayDate() {
                const d = new Date();
                return `${d.getFullYear()}.${String(d.getMonth()+1).padStart(2,'0')}.${String(d.getDate()).padStart(2,'0')}`;
            }

            function getRandomWeather() {
                return WEATHER_MOODS[Math.floor(Math.random() * WEATHER_MOODS.length)];
            }

            function getRandomMessage() {
                return MESSAGES[Math.floor(Math.random() * MESSAGES.length)];
            }

            // ------------------ 次数管理 (localStorage) ------------------
            function getTodayKey() {
                const d = new Date();
                return `count_${d.getFullYear()}_${d.getMonth()+1}_${d.getDate()}`;
            }

            function getTodayCount() {
                const key = getTodayKey();
                const val = localStorage.getItem(key);
                return val ? parseInt(val, 10) : 0;
            }

            function incrementCount() {
                const key = getTodayKey();
                const current = getTodayCount();
                localStorage.setItem(key, current + 1);
            }

            function canGenerate() {
                return getTodayCount() < 3;
            }

            function updateCountDisplay() {
                const remaining = 3 - getTodayCount();
                countDisplay.textContent = `今日剩余 ${remaining} 封`;
            }

            // ------------------ 界面切换 ------------------
            function showMain(character) {
                charNameEl.textContent = character;
                dateEl.textContent = getTodayDate();
                weatherEl.textContent = getRandomWeather();

                // 如果还有次数，显示第一条消息
                if (canGenerate()) {
                    messageEl.textContent = getRandomMessage();
                    incrementCount();  // 第一次也算一次
                } else {
                    messageEl.textContent = '今日的信已经看完，明天再来吧。';
                }

                updateCountDisplay();

                // 切换显示
                qScreen.style.display = 'none';
                mContent.style.display = 'block';
            }

            function showQuestion() {
                qScreen.style.display = 'block';
                mContent.style.display = 'none';
                charInput.value = '';
                charInput.focus();
            }

            // ------------------ 生成新消息 ------------------
            function tryGenerateNewMessage() {
                if (!canGenerate()) {
                    alert('今日已看完三封信，明天再来吧 ✨');
                    generateBtn.disabled = true;
                    return false;
                }

                // 换天气（小彩蛋）
                weatherEl.textContent = getRandomWeather();

                // 淡出效果 + 新消息
                messageEl.style.opacity = '0';
                setTimeout(() => {
                    messageEl.textContent = getRandomMessage();
                    messageEl.style.opacity = '1';
                }, 150);

                incrementCount();
                updateCountDisplay();

                if (!canGenerate()) {
                    generateBtn.disabled = true;
                }
                return true;
            }

            // ------------------ 事件绑定 ------------------
            startBtn.addEventListener('click', () => {
                const name = charInput.value.trim();
                if (!name) {
                    alert('请输入梦角的名字');
                    return;
                }
                showMain(name);
            });

            charInput.addEventListener('keypress', (e) => {
                if (e.key === 'Enter') startBtn.click();
            });

            generateBtn.addEventListener('click', () => {
                tryGenerateNewMessage();
            });

            resetLink.addEventListener('click', showQuestion);

            // 初始化
            qScreen.style.display = 'block';
            mContent.style.display = 'none';
            updateCountDisplay();  // 预显示

            // 每次进入主界面时，根据剩余次数决定按钮状态
            // 已在 showMain 中处理
        })();
    </script>
</body>
</html>
