<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>今日关心 · 粉色梦境</title>
    <style>
        /* 粉色梦幻风格 */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: "微软雅黑", "圆体", "Yuanti SC", sans-serif;
            background: linear-gradient(145deg, #ffd1dc 0%, #ffe4e1 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            position: relative;
        }
        
        /* 小星星装饰 */
        body::before {
            content: "✨✨✨";
            position: absolute;
            top: 10px;
            left: 10px;
            font-size: 24px;
            opacity: 0.3;
            animation: twinkle 3s infinite;
        }
        
        body::after {
            content: "✨✨✨";
            position: absolute;
            bottom: 10px;
            right: 10px;
            font-size: 24px;
            opacity: 0.3;
            animation: twinkle 3s infinite 1.5s;
        }
        
        @keyframes twinkle {
            0% { opacity: 0.3; }
            50% { opacity: 0.6; }
            100% { opacity: 0.3; }
        }
        
        .container {
            background: rgba(255, 245, 245, 0.9);
            backdrop-filter: blur(12px);
            border-radius: 60px;
            padding: 45px 35px;
            max-width: 600px;
            width: 100%;
            box-shadow: 0 30px 50px rgba(255, 150, 180, 0.2);
            border: 2px solid rgba(255, 255, 255, 0.7);
            text-align: center;
            position: relative;
            z-index: 1;
        }
        
        h1 {
            font-size: 26px;
            font-weight: 300;
            color: #b05b7a;
            margin-bottom: 30px;
            letter-spacing: 2px;
            text-shadow: 2px 2px 4px rgba(255, 200, 210, 0.5);
        }
        
        .message-box {
            background: white;
            border-radius: 50px;
            padding: 45px 35px;
            margin: 20px 0 30px;
            min-height: 200px;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 2px solid #ffe2e2;
            box-shadow: inset 0 0 20px #fff0f0;
        }
        
        #message {
            font-size: 30px;
            line-height: 1.6;
            color: #8c4a5f;
            font-weight: 400;
            transition: opacity 0.3s ease;
            word-break: break-word;
        }
        
        .button {
            background: linear-gradient(145deg, #ffb6c1, #ff9eb5);
            border: none;
            padding: 18px 40px;
            border-radius: 40px;
            font-size: 20px;
            color: white;
            cursor: pointer;
            transition: all 0.3s;
            box-shadow: 0 8px 15px rgba(255, 120, 140, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.5);
            margin-top: 20px;
            font-weight: 300;
            letter-spacing: 1px;
        }
        
        .button:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 25px rgba(255, 120, 140, 0.4);
            background: linear-gradient(145deg, #ff9eb5, #ff8da1);
        }
        
        .footer {
            margin-top: 30px;
            color: #b08e9b;
            font-size: 15px;
            font-style: italic;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>✨ 今日关心 · 粉色梦境 ✨</h1>
        
        <div class="message-box">
            <div id="message">今天记得好好吃饭</div>
        </div>
        
        <button class="button" onclick="getNewMessage()">换一句温柔</button>
        <div class="footer">每天都要爱自己</div>
    </div>

    <script>
        // 温暖话语库
        const messages = [
            "今天记得好好吃饭",
            "累了就休息一下",
            "你已经做得很好了",
            "今天也会是美好的一天",
            "记得多喝水",
            "你值得被温柔对待",
            "慢慢来，不着急",
            "今天有没有开心的事",
            "别太勉强自己",
            "有人在默默关心你",
            "今天也要开心",
            "你比想象中更坚强",
            "休息一下也没关系",
            "今天的你也很可爱",
            "记得早点睡",
            "天气变化，注意保暖",
            "你很重要",
            "今天也要照顾好自己",
            "允许自己不完美",
            "你被爱着"
        ];

        function getRandomMessage() {
            const randomIndex = Math.floor(Math.random() * messages.length);
            return messages[randomIndex];
        }

        function getNewMessage() {
            const messageEl = document.getElementById('message');
            messageEl.style.opacity = '0';
            setTimeout(() => {
                messageEl.textContent = getRandomMessage();
                messageEl.style.opacity = '1';
            }, 150);
        }

        window.onload = function() {
            document.getElementById('message').textContent = getRandomMessage();
        };
    </script>
</body>
</html>
