<!-- 极简版：只有一句话，但氛围拉满 -->
<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>一句话</title>
    <style>
        body {
            background: #1a1a1a;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            font-family: "Times New Roman", serif;
        }
        
        .container {
            max-width: 600px;
            text-align: center;
        }
        
        .time {
            color: #4a4a4a;
            font-size: 14px;
            margin-bottom: 60px;
            letter-spacing: 2px;
        }
        
        .message {
            color: rgba(255,255,255,0.9);
            font-size: 32px;
            line-height: 1.5;
            margin-bottom: 80px;
            font-weight: 300;
            opacity: 0;
            animation: fadeIn 1.5s ease forwards;
        }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        .from {
            color: #4a4a4a;
            font-size: 16px;
            border-top: 1px solid #2a2a2a;
            padding-top: 30px;
            width: fit-content;
            margin: 0 auto;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="time" id="timeDisplay"></div>
        <div class="message" id="messageDisplay"></div>
        <div class="from" id="fromDisplay"></div>
    </div>

    <script>
        // 从URL获取名字
        const params = new URLSearchParams(window.location.search);
        const name = params.get('name') || '五条悟';
        
        // 消息库
        const messages = [
            "今天看到一朵云，长得很像你笑的样子。",
            "记得吃早饭，不要饿着。",
            "窗外的花开得很好，下次带你来看。",
            "昨晚梦到你了，醒来还在笑。",
            "累了的话，我在这里。",
            "今天的风很温柔，像你的名字。"
        ];
        
        // 随机选一句
        document.getElementById('messageDisplay').textContent = 
            messages[Math.floor(Math.random() * messages.length)];
        
        // 显示名字
        document.getElementById('fromDisplay').textContent = `—— ${name}`;
        
        // 更新时间
        const now = new Date();
        const timeStr = `${now.getHours()}:${now.getMinutes().toString().padStart(2,'0')}`;
        document.getElementById('timeDisplay').textContent = timeStr;
    </script>
</body>
</html>
